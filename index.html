<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FluxxAI PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0a0a;
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:linear-gradient(90deg,#ff00cc,#3333ff,#00ffcc);
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img{
  width:35px;
  border-radius:50%;
}

/* LOGIN */
#loginOverlay{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  z-index:10;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
}

/* CARDS */
.container{
  padding:20px;
}
.card{
  background:#111;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,255,255,0.2);
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <h1>FluxxAI</h1>

  <button onclick="loginGoogle()">Login with Google</button>

  <h3>OR</h3>

  <input id="phone" placeholder="+65XXXXXXXX">
  <div id="recaptcha-container"></div>
  <button onclick="setupRecaptcha(); sendCode()">Send Code</button>

  <input id="code" placeholder="Enter OTP">
  <button onclick="verifyCode()">Verify Code</button>
</div>

<!-- NAVBAR -->
<nav>
  <div>FluxxAI</div>
  <div class="profile">
    <span id="profileName">User</span>
    <img id="profilePic">
    <span>XP: <span id="xp">0</span></span>
  </div>
</nav>

<div class="container">

<div class="card">
  <h2>Welcome</h2>
  <p>AI learning platform 🚀</p>
</div>

<div class="card">
  <h2>Lesson: Cells</h2>
  <p>The nucleus controls the cell.</p>
  <button onclick="addXP(5)">Complete Lesson (+5 XP)</button>
</div>

<div class="card">
  <h2>Quiz</h2>
  <p>What controls the cell?</p>
  <button onclick="checkAnswer(true)">Nucleus</button>
  <button onclick="checkAnswer(false)">Mitochondria</button>
</div>

<div class="card">
  <h2>AI Tutor</h2>
  <input id="aiInput" placeholder="Ask anything...">
  <button onclick="askAI()">Ask</button>
  <p id="aiOutput"></p>
</div>

</div>

<!-- SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  RecaptchaVerifier,
  signInWithPhoneNumber,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyC95K4zdbLvt9OXKxSidoIO85vpguHj6nw",
  authDomain: "fluxxaiedu-61986.firebaseapp.com",
  projectId: "fluxxaiedu-61986",
  storageBucket: "fluxxaiedu-61986.appspot.com",
  messagingSenderId: "397934390397",
  appId: "1:397934390397:web:7044220ef90dcc6541d514"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();

/* GOOGLE LOGIN */
window.loginGoogle = async () => {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    showUser(result.user);
  } catch (err) {
    alert(err.message);
  }
};

/* PHONE LOGIN */
window.setupRecaptcha = () => {
  window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", {
    size: "normal"
  });
};

window.sendCode = async () => {
  const phone = document.getElementById("phone").value;

  const confirmationResult = await signInWithPhoneNumber(
    auth,
    phone,
    window.recaptchaVerifier
  );

  window.confirmationResult = confirmationResult;
  alert("Code sent!");
};

window.verifyCode = async () => {
  const code = document.getElementById("code").value;

  const result = await window.confirmationResult.confirm(code);
  showUser(result.user);
};

/* SHOW USER */
function showUser(user){
  document.getElementById("loginOverlay").style.display = "none";

  document.getElementById("profileName").innerText =
    user.displayName || user.phoneNumber;

  document.getElementById("profilePic").src =
    user.photoURL || "https://i.pravatar.cc/100";
}

/* AUTO LOGIN */
onAuthStateChanged(auth, user=>{
  if(user) showUser(user);
});

/* AI */
const HF_TOKEN = "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";

window.askAI = async ()=>{
  const input = document.getElementById("aiInput").value;
  const output = document.getElementById("aiOutput");

  output.innerText = "Thinking...";

  const res = await fetch(
    "https://api-inference.huggingface.co/models/google/flan-t5-base",
    {
      method:"POST",
      headers:{
        Authorization:`Bearer ${HF_TOKEN}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        inputs:"Explain simply: "+input
      })
    }
  );

  const data = await res.json();
  output.innerText = data[0]?.generated_text || "AI failed.";
};

/* XP */
let xp = localStorage.getItem("xp") || 0;
document.getElementById("xp").innerText = xp;

window.addXP = (amt)=>{
  xp = parseInt(xp)+amt;
  localStorage.setItem("xp",xp);
  document.getElementById("xp").innerText = xp;
};

/* QUIZ */
window.checkAnswer = (correct)=>{
  if(correct){
    alert("Correct +10XP");
    addXP(10);
  } else {
    alert("Wrong");
  }
};
</script>

</body>
</html>
